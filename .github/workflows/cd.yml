name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:  # чтобы запускать руками для теста

jobs:
  docker-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/money-manager:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/money-manager:latest ${{ secrets.DOCKER_USERNAME }}/money-manager:${{ github.sha }}

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/money-manager:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/money-manager:${{ github.sha }}